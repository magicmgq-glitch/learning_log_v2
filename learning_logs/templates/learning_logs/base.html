{% load django_bootstrap5 %}
<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习笔记</title>
    {% bootstrap_css %}
    {% bootstrap_javascript %}
</head>
<body class="bg-light">

    <nav class="navbar navbar-light bg-light mb-4 border-bottom shadow-sm">
        <div class="container">

            <div class="d-flex align-items-center">
                <a class="navbar-brand fs-4 fw-bold text-primary mb-0" href="{% url 'learning_logs:index' %}">
                    学习笔记
                </a>

                <ul class="navbar-nav ms-3 mb-0 d-none d-md-flex flex-row gap-3">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'learning_logs:public_feed' %}">笔记广场</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'learning_logs:topics' %}">我的主题</a>
                    </li>
                </ul>
            </div>

            <div class="d-flex align-items-center gap-2">
                {% if user.is_authenticated %}

                    <span class="navbar-text d-none d-md-inline-block me-3 text-muted">
                        你好, <strong>{{ user.username }}</strong>
                    </span>

                    <form action="{% url 'users:logout' %}" method="post" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-outline-secondary px-3">注销</button>
                    </form>

                {% else %}

                    <a href="{% url 'users:register' %}" class="btn btn-sm btn-outline-primary px-3">注册</a>
                    <a href="{% url 'users:login' %}" class="btn btn-sm btn-primary px-3 shadow-sm">登录</a>

                {% endif %}
            </div>

        </div>
    </nav>

    <div class="container pb-5">
        {% block content %}{% endblock content %}
    </div>

</body>
</html>
