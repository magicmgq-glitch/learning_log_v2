{% extends "learning_logs/base.html" %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4 mt-3">
        <h2 class="fw-bold">我的学习主题</h2>
        <a href="{% url 'learning_logs:new_topic' %}" class="btn btn-primary shadow-sm">
            + 添加新主题
        </a>
    </div>

    <div class="list-group shadow-sm mb-5">
        {% for topic in topics %}
            <a href="{% url 'learning_logs:topic' topic.id %}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3">
                <span class="fs-5">{{ topic.text }}</span>
                <span class="text-muted small">查看笔记 &raquo;</span>
            </a>
        {% empty %}
            <div class="list-group-item p-4 text-center text-muted">
                目前还没有任何主题，赶快点击右上角添加一个吧！
            </div>
        {% endfor %}
    </div>
{% endblock content %}
