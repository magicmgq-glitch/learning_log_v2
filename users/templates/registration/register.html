{% extends "learning_logs/base.html" %}
{% load django_bootstrap5 %}

{% block content %}
    <div class="row justify-content-center mt-4">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h3 class="card-title text-center mb-4 fw-bold">注册新账户</h3>
                    <p class="text-muted text-center mb-4">当前注册需要有效邀请码，请先向管理员获取。</p>
                    <form method="post" action="{% url 'users:register' %}">
                        {% csrf_token %}
                        {% bootstrap_form form %}
                        <button type="submit" class="btn btn-primary w-100 mt-4 btn-lg">完成注册</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
