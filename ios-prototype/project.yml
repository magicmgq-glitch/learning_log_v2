name: LearningLogIOSPrototype
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.miao.learninglogiosprototype
    SWIFT_VERSION: "5.0"
targets:
  LearningLogIOSPrototype:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - .DerivedData
          - "*.xcodeproj"
          - README.md
          - project.yml
    settings:
      base:
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        VERSIONING_SYSTEM: apple-generic
    scheme:
      testTargets: []
